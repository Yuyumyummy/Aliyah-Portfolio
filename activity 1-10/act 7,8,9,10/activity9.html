<!DOCTYPE html>
<html>
    <head>
        <title>Activity 9</title>
        <script>
            function myfunction() {
               let txt;
               let fullname = prompt("Full name:", "Enter full name here");
               if(fullname == null || fullname == ""){
                txt = "This field is required!";
               }else {
                txt = "Hello, " + fullname + "! How are you today?";
               }document.getElementById("demo").innerHTML = txt;
            }
        </script>
    </head>
    <body>
        <h2>Javascript Prompt</h2>
        <button onclick="myfunction()">Click here!</button>
        <p id="demo"></p>
    </body>
</html>
